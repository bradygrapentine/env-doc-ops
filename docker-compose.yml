services:
  postgres:
    image: postgres:16
    container_name: envdocos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: envdocos
    ports:
      - "5434:5432"
    volumes:
      - envdocos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  envdocos_pgdata:
